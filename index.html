<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💩 爱情粪斗史</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p1:#E8A87C;--p1-light:#FDF0E6;--p2:#F4A9A9;--p2-light:#FEF0F0;
  --bg:#FFF8F0;--card:#fff;--text:#5D4037;--text2:#8D6E63;
  --gold:#D4A853;--brown:#A67B5B;--radius:14px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
.app{max-width:480px;margin:0 auto;padding:14px}

/* Header */
.header{text-align:center;padding:16px 0 10px}
.header h1{font-size:26px;font-weight:700;margin-bottom:4px}
.header .sub{font-size:13px;color:var(--text2);margin-bottom:4px}
.header .date{font-size:13px;color:var(--text2)}

/* Person Cards */
.person-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.person-card{background:var(--card);border-radius:var(--radius);padding:18px 12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.04);position:relative;overflow:hidden}
.person-card.p1{border-top:3px solid var(--p1)}
.person-card.p2{border-top:3px solid var(--p2)}
.person-card .avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px}
.person-card.p1 .avatar{background:var(--p1-light)}
.person-card.p2 .avatar{background:var(--p2-light)}
.person-card .name{font-size:16px;font-weight:600;margin-bottom:2px}
.person-card .stats-line{font-size:12px;color:var(--text2);margin-bottom:10px}
.person-card .stats-line b{color:var(--brown)}
.checkin-btn{display:block;width:100%;padding:11px;border:none;border-radius:22px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;transition:transform .15s;letter-spacing:1px;position:relative;z-index:1}
.checkin-btn:active{transform:scale(.95)}
.checkin-btn.p1{background:var(--p1)}
.checkin-btn.p2{background:var(--p2)}
.checkin-btn:disabled{background:#ccc!important;pointer-events:none}
.crown-badge{position:absolute;top:-2px;right:8px;font-size:18px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:flex-end;justify-content:center;padding:16px}
.modal-card{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:20px 16px 24px;max-height:80vh;overflow-y:auto}
.modal-card h3{text-align:center;font-size:17px;margin-bottom:4px}
.modal-card .modal-sub{text-align:center;font-size:12px;color:var(--text2);margin-bottom:14px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-option{background:#faf7f3;border:2px solid transparent;border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.type-option:active,.type-option.selected{border-color:var(--gold);background:#fffbf0}
.type-option .type-emoji{font-size:28px;display:block;margin-bottom:4px}
.type-option .type-name{font-size:13px;font-weight:600;margin-bottom:2px}
.type-option .type-desc{font-size:11px;color:var(--text2)}
.modal-cancel{display:block;width:100%;margin-top:10px;padding:10px;background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer}

/* Section */
.section-title{font-size:15px;font-weight:600;margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:4px;height:15px;background:var(--gold);border-radius:2px}

/* Records */
.records-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.04);max-height:360px;overflow-y:auto}
.record-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #faf3eb}
.record-row:last-child{border-bottom:none}
.record-emoji{font-size:22px;margin-right:8px;flex-shrink:0}
.record-info{flex:1;min-width:0}
.record-name{font-size:13px;font-weight:500}
.record-type{font-size:11px;color:var(--text2)}
.record-time{font-size:12px;color:var(--text2);text-align:right}
.empty-state{text-align:center;padding:28px 0;color:var(--text2);font-size:13px}
.empty-state .big{font-size:40px;display:block;margin-bottom:8px}

/* Stats Tabs */
.stats-tabs{display:flex;background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.stats-tab{flex:1;text-align:center;padding:9px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .2s}
.stats-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}

.stats-content{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}

/* Summary boxes */
.summary-row{display:flex;gap:10px;margin-bottom:14px}
.summary-box{flex:1;text-align:center;padding:10px 6px;background:#fdf9f3;border-radius:10px}
.summary-box .num{font-size:20px;font-weight:700}
.summary-box .num.p1{color:var(--p1)}.summary-box .num.p2{color:var(--p2)}
.summary-box .lbl{font-size:11px;color:var(--text2);margin-top:2px}

/* Week */
.week-row{display:flex;align-items:center;padding:7px 0;gap:8px;border-bottom:1px solid #faf3eb}
.week-row:last-child{border-bottom:none}
.week-today{background:#fffdf5;border-radius:6px;margin:0 -4px;padding:7px 4px}
.week-day{font-size:12px;min-width:28px;font-weight:500;text-align:center}
.week-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.week-bar-row{display:flex;align-items:center;gap:6px;font-size:11px}
.week-dot{width:6px;height:6px;border-radius:50%}
.week-dot.p1{background:var(--p1)}.week-dot.p2{background:var(--p2)}
.week-bar-bg{flex:1;height:10px;background:#eee;border-radius:5px;overflow:hidden}
.week-bar-fill{height:100%;border-radius:5px}
.week-bar-fill.p1{background:var(--p1)}.week-bar-fill.p2{background:var(--p2)}
.week-cnt{font-size:11px;color:var(--text2);min-width:24px;text-align:right}

/* Month Calendar */
.cal-month{text-align:center;font-size:15px;font-weight:600;margin-bottom:8px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.calendar .dl{font-size:11px;color:var(--text2);padding:3px 0;font-weight:500}
.calendar .dc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;font-size:12px;background:#faf7f3}
.calendar .dc.empty{background:transparent}
.calendar .dc.today{box-shadow:inset 0 0 0 2px var(--gold);font-weight:700}
.calendar .dn{font-size:12px;font-weight:500}
.calendar .dt{font-size:9px;color:var(--text2)}
.calendar .h1{background:#fdf0e0}.calendar .h2{background:#fce4c0}.calendar .h3{background:#fbd5a0}.calendar .h4{background:#fac880}

/* Year */
.year-chart{display:flex;align-items:flex-end;gap:5px;height:180px;padding-top:8px}
.yb-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.yb-stack{width:100%;display:flex;flex-direction:column;border-radius:3px 3px 0 0;overflow:hidden}
.yb-p1{background:var(--p1)}.yb-p2{background:var(--p2)}
.yb-lbl{font-size:10px;color:var(--text2);margin-top:4px}
.yb-val{font-size:9px;color:var(--text2)}

/* Battle */
.battle-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-top:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);text-align:center}
.battle-card h3{font-size:15px;margin-bottom:10px}
.battle-bars{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.battle-name{font-size:12px;min-width:36px;font-weight:500}
.battle-bar-bg{flex:1;height:18px;background:#eee;border-radius:9px;overflow:hidden;display:flex}
.battle-bar-fill{height:100%;transition:width .5s}
.battle-bar-fill.l{background:var(--p1)}.battle-bar-fill.r{background:var(--p2);margin-left:auto}
.battle-num{font-size:12px;font-weight:600;min-width:30px}
.battle-verdict{font-size:13px;color:var(--text2);margin-top:4px}

/* Config */
.cfg-toggle{display:block;margin:16px auto 0;background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;padding:6px 12px}
.cfg-panel{display:none;background:var(--card);border-radius:var(--radius);padding:14px;margin-top:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cfg-panel.show{display:block}
.cfg-panel label{display:block;font-size:13px;font-weight:500;margin-bottom:4px}
.cfg-panel input{width:100%;padding:9px;border:1px solid #e0d5c7;border-radius:8px;font-size:14px;margin-bottom:8px;background:#fdf9f3}
.cfg-panel .save-btn{width:100%;padding:10px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#5D4037;color:#fff;padding:9px 22px;border-radius:18px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* Animation */
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.checkin-pop{position:fixed;top:50%;left:50%;font-size:56px;pointer-events:none;z-index:998;animation:popIn .5s ease-out forwards}

/* Loading */
.loading{text-align:center;padding:60px 20px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #f0e6d3;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="loading" id="loading"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">正在加载...</div></div>
  <div id="main" style="display:none">
    <div class="header">
      <h1>💩 爱情粪斗史</h1>
      <div class="sub">记录每一次畅快 · 见证我们的日常</div>
      <div class="date" id="headerDate"></div>
    </div>

    <div class="person-cards" id="personCards"></div>

    <div class="section-title">📋 今日排便记录</div>
    <div class="records-card" id="todayRecords"></div>

    <div class="section-title">📊 排便统计</div>
    <div class="stats-tabs">
      <div class="stats-tab active" data-period="week">本周</div>
      <div class="stats-tab" data-period="month">本月</div>
      <div class="stats-tab" data-period="year">本年</div>
    </div>
    <div class="stats-content" id="statsContent"></div>

    <div class="battle-card" id="battleCard"></div>

    <button class="cfg-toggle" onclick="toggleCfg()">修改名字</button>
    <div class="cfg-panel" id="cfgPanel">
      <label>第一个人</label><input type="text" id="cn1" maxlength="6">
      <label>第二个人</label><input type="text" id="cn2" maxlength="6">
      <button class="save-btn" onclick="saveCfg()">保存</button>
    </div>
  </div>
</div>

<!-- Poop Type Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-card" id="modalCard">
    <h3 id="modalTitle">选择便便类型</h3>
    <div class="modal-sub" id="modalSub"></div>
    <div class="type-grid" id="typeGrid"></div>
    <button class="modal-cancel" onclick="closeModal()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB='https://jjekyhaileozrslwgoei.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqZWt5aGFpbGVvenJzbHdnb2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDgwMTQsImV4cCI6MjA5NTI4NDAxNH0.urz5cnfpbakiiChjo4orgux9KNboKCmgGERvf3kUxQc';
var H={apikey:SK,Authorization:'Bearer '+SK};

var persons=['宝宝','乖乖'],records=[],curPeriod='week',curPerson='';

var types=[
  {emoji:'🟤',name:'标准便便',desc:'稳如老狗，平平淡淡才是真'},
  {emoji:'💎',name:'黄金便便',desc:'今日MVP，形状完美色泽金黄'},
  {emoji:'💨',name:'一泻千里',desc:'畅快淋漓，根本停不下来'},
  {emoji:'🪨',name:'千辛万苦',desc:'终于出来了，值得庆祝'},
  {emoji:'🌸',name:'丝滑顺畅',desc:'如德芙般丝滑，完美体验'},
  {emoji:'🌙',name:'深夜炸弹',desc:'睡前清仓，安心入眠'},
  {emoji:'😤',name:'憋王之王',desc:'忍了一天终于等到你'},
  {emoji:'💕',name:'想你就通',desc:'爱的力量，想到你就通畅了'}
];

var funnyMsgs=[
  '已记录！你的便便已被载入史册 💩',
  '恭喜完成今日大业！肠道通畅，爱情长久 🎉',
  '这一泡，注定载入爱情粪斗史 📖',
  '便便：我来过，我走了，不带走一片云彩 💨',
  '已通知对方：有人刚刚释放了自我 😏',
  '肠道：今天也辛苦啦！明天见 👋',
  '对方收到一条气味消息，请注意查收 📩',
  '拉屎打卡成功！离人生赢家又近了一步 ⭐',
  '便便对你表示满意，并点了个赞 👍',
  '恭喜你，肠道年龄-1岁 🎂'
];

function today(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pad(n){return String(n).padStart(2,'0')}
function ft(iso){var d=new Date(iso);return pad(d.getHours())+':'+pad(d.getMinutes())}
function fd(iso){var d=new Date(iso);return (d.getMonth()+1)+'/'+d.getDate()}
function fm(iso){var d=new Date(iso);return d.getHours()+':'+pad(d.getMinutes());}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},1800)}
function getMonday(d){var r=new Date(d);var day=r.getDay();r.setDate(r.getDate()+(day===0?-6:1-day));r.setHours(0,0,0,0);return r}

async function sbGet(t,q){var r=await fetch(SB+'/rest/v1/'+t+'?'+(q||'select=*&order=created_at.desc'),{headers:H});if(!r.ok)throw new Error('Load fail');return r.json()}
async function sbPost(t,b){var r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:Object.assign({},H,{'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(b)});if(!r.ok)throw new Error('Save fail');return r.json()}
async function sbPatchCfg(k,v){await fetch(SB+'/rest/v1/poop_config?key=eq.'+encodeURIComponent(k),{method:'PATCH',headers:Object.assign({},H,{'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify({value:v})})}

async function loadData(){
  var a=await Promise.all([sbGet('poop_records'),sbGet('poop_config','select=*')]);
  records=a[0].map(function(c){return{person:c.person,type:c.type,time:c.created_at}});
  var cfg={};a[1].forEach(function(c){cfg[c.key]=c.value});
  if(cfg.person1&&cfg.person2)persons=[cfg.person1,cfg.person2];
}

// Modal
window._checkinPerson='';
function openModal(person){
  curPerson=person;window._checkinPerson=person;
  document.getElementById('modalTitle').textContent=person+' · 选择便便类型';
  document.getElementById('modalSub').textContent='今天属于哪一种？';
  document.getElementById('typeGrid').innerHTML=types.map(function(t,i){
    return '<div class="type-option" onclick="doCheckin(\''+person+'\',\''+t.name+'\')"><span class="type-emoji">'+t.emoji+'</span><span class="type-name">'+t.name+'</span><span class="type-desc">'+t.desc+'</span></div>';
  }).join('');
  document.getElementById('modal').style.display='flex';
}
function closeModal(e){if(!e||e.target===document.getElementById('modal')){document.getElementById('modal').style.display='none'}}

async function doCheckin(person,type){
  document.getElementById('modal').style.display='none';
  try{
    await sbPost('poop_records',{person:person,type:type});
    await loadData();renderAll();
    var el=document.createElement('div');el.className='checkin-pop';
    var t=types.find(function(t){return t.name===type});
    el.textContent=t?t.emoji:'💩';document.body.appendChild(el);
    setTimeout(function(){el.remove()},500);
    toast(funnyMsgs[Math.floor(Math.random()*funnyMsgs.length)]);
  }catch(e){toast('记录失败，请重试')}
}

function renderAll(){renderHeader();renderCards();renderTodayRecords();renderStats();renderBattle()}

function renderHeader(){
  var n=new Date();var w=['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 星期'+w[n.getDay()];
}

function renderCards(){
  var c=document.getElementById('personCards');
  var td=today(),emojis=['👦','👧'];
  var tc=records.filter(function(r){return r.time&&r.time.startsWith(td)});
  c.innerHTML=persons.map(function(n,i){
    var cnt=tc.filter(function(r){return r.person===n}).length;
    var cl=i===0?'p1':'p2';
    return'<div class="person-card '+cl+'"><div class="avatar">'+emojis[i]+'</div><div class="name">'+n+'</div><div class="stats-line">今日已排 <b>'+cnt+'</b> 次</div><button class="checkin-btn '+cl+'" onclick="openModal(\''+n+'\')">💩 打卡</button></div>';
  }).join('');
}

function renderTodayRecords(){
  var c=document.getElementById('todayRecords'),td=today();
  var rec=records.filter(function(r){return r.time&&r.time.startsWith(td)});
  if(rec.length===0){c.innerHTML='<div class="empty-state"><span class="big">🚽</span>今天还没有排便记录<br>快去打卡吧！</div>';return}
  var s=rec.slice().reverse();
  c.innerHTML=s.map(function(r){
    var t=types.find(function(t){return t.name===r.type});
    return'<div class="record-row"><div class="record-emoji">'+(t?t.emoji:'💩')+'</div><div class="record-info"><div class="record-name">'+r.person+'</div><div class="record-type">'+r.type+'</div></div><div class="record-time">'+ft(r.time)+'</div></div>';
  }).join('');
}

function renderStats(){
  var c=document.getElementById('statsContent');
  if(curPeriod==='week')c.innerHTML=rw();else if(curPeriod==='month')c.innerHTML=rm();else c.innerHTML=ry();
}

function rw(){
  var mon=getMonday(new Date()),days=[],dn=['一','二','三','四','五','六','日'],td=today(),t1=0,t2=0;
  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(d.getDate()+i);days.push(d)}
  var mx=1;days.forEach(function(d){var s=d.toISOString().split('T')[0];var c=records.filter(function(r){return r.time&&r.time.startsWith(s)}).length;if(c>mx)mx=c});
  var rows=days.map(function(d,i){
    var s=d.toISOString().split('T')[0],c1=records.filter(function(r){return r.time&&r.time.startsWith(s)&&r.person===persons[0]}).length,c2=records.filter(function(r){return r.time&&r.time.startsWith(s)&&r.person===persons[1]}).length;
    t1+=c1;t2+=c2;var it=s===td;
    return'<div class="week-row'+(it?' week-today':'')+'"><div class="week-day">周'+dn[i]+'</div><div class="week-bars"><div class="week-bar-row"><div class="week-dot p1"></div><span>'+persons[0]+'</span><div class="week-bar-bg"><div class="week-bar-fill p1" style="width:'+(c1/mx*100)+'%"></div></div><span>'+c1+'次</span></div><div class="week-bar-row"><div class="week-dot p2"></div><span>'+persons[1]+'</span><div class="week-bar-bg"><div class="week-bar-fill p2" style="width:'+(c2/mx*100)+'%"></div></div><span>'+c2+'次</span></div></div></div>';
  }).join('');
  return sbHtml(t1,t2,'本周')+rows;
}

function rm(){
  var n=new Date(),y=n.getFullYear(),m=n.getMonth(),fd0=new Date(y,m,1),ld=new Date(y,m+1,0),td=today();
  var sd=fd0.getDay();sd=sd===0?6:sd-1;
  var t1=0,t2=0,cls='';
  for(var i=0;i<sd;i++)cls+='<div class="dc empty"></div>';
  for(var d=1;d<=ld.getDate();d++){
    var ds=y+'-'+pad(m+1)+'-'+pad(d),c1=records.filter(function(r){return r.time&&r.time.startsWith(ds)&&r.person===persons[0]}).length,c2=records.filter(function(r){return r.time&&r.time.startsWith(ds)&&r.person===persons[1]}).length,t=c1+c2;
    t1+=c1;t2+=c2;var h='';if(t>=6)h='h4';else if(t>=4)h='h3';else if(t>=2)h='h2';else if(t>=1)h='h1';
    cls+='<div class="dc '+h+(ds===td?' today':'')+'"><span class="dn">'+d+'</span>'+(t>0?'<span class="dt">'+t+'次</span>':'')+'</div>';
  }
  return sbHtml(t1,t2,'本月')+'<div class="cal-month">'+y+'年'+(m+1)+'月</div><div class="calendar"><div class="dl">一</div><div class="dl">二</div><div class="dl">三</div><div class="dl">四</div><div class="dl">五</div><div class="dl">六</div><div class="dl">日</div>'+cls+'</div>';
}

function ry(){
  var n=new Date(),y=n.getFullYear(),ms=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],md=[],mx=1;
  for(var m=0;m<12;m++){
    var p=y+'-'+pad(m+1),c1=records.filter(function(r){return r.time&&r.time.startsWith(p)&&r.person===persons[0]}).length,c2=records.filter(function(r){return r.time&&r.time.startsWith(p)&&r.person===persons[1]}).length;
    md.push({m:m,c1:c1,c2:c2,t:c1+c2});if(c1+c2>mx)mx=c1+c2;
  }
  var t1=md.reduce(function(s,d){return s+d.c1},0),t2=md.reduce(function(s,d){return s+d.c2},0);
  var bars=md.map(function(d){var h1=(d.c1/mx*140)||0,h2=(d.c2/mx*140)||0;return'<div class="yb-col"><div class="yb-val">'+(d.t||'')+'</div><div class="yb-stack" style="height:'+(h1+h2)+'px"><div class="yb-p2" style="height:'+h2+'px"></div><div class="yb-p1" style="height:'+h1+'px"></div></div><div class="yb-lbl" style="'+(d.m===n.getMonth()?'font-weight:700':'')+'">'+ms[d.m]+'</div></div>'}).join('');
  return sbHtml(t1,t2,'本年')+'<div class="cal-month">'+y+'年</div><div class="year-chart">'+bars+'</div><div style="display:flex;justify-content:center;gap:16px;margin-top:6px;font-size:11px;color:var(--text2)"><span>■ '+persons[0]+'</span><span>■ '+persons[1]+'</span></div>';
}

function sbHtml(t1,t2,label){
  return'<div class="summary-row"><div class="summary-box"><div class="num p1">'+t1+'</div><div class="lbl">'+persons[0]+' · '+label+'</div></div><div class="summary-box"><div class="num p2">'+t2+'</div><div class="lbl">'+persons[1]+' · '+label+'</div></div><div class="summary-box"><div class="num">'+(t1+t2)+'</div><div class="lbl">合计</div></div></div>';
}

function renderBattle(){
  var c=document.getElementById('battleCard');
  var t1=records.filter(function(r){return r.person===persons[0]}).length,t2=records.filter(function(r){return r.person===persons[1]}).length,max=Math.max(t1,t2,1);
  var verdict;
  if(t1===0&&t2===0)verdict='还没有数据，快来第一泡吧！🚽';
  else if(t1>t2*1.5)verdict='🏆 '+persons[0]+' 遥遥领先！'+persons[1]+' 要加油了！';
  else if(t2>t1*1.5)verdict='🏆 '+persons[1]+' 一骑绝尘！'+persons[0]+' 要加油了！';
  else if(t1>t2)verdict='🔥 '+persons[0]+' 暂时领先，竞争激烈！';
  else if(t2>t1)verdict='🔥 '+persons[1]+' 略胜一筹，紧追不舍！';
  else if(t1===t2&&t1>0)verdict='⚖️ 势均力敌！你们是天生一对！';
  else verdict='🚽 还未开战，等待第一泡...';
  c.innerHTML='<h3>⚔️ 历史总战绩</h3><div class="battle-bars"><div class="battle-name">'+persons[0]+'</div><div class="battle-bar-bg"><div class="battle-bar-fill l" style="width:'+(t1/max*100)+'%"></div></div><div class="battle-num">'+t1+'</div></div><div class="battle-bars"><div class="battle-name">'+persons[1]+'</div><div class="battle-bar-bg"><div class="battle-bar-fill r" style="width:'+(t2/max*100)+'%"></div></div><div class="battle-num">'+t2+'</div></div><div class="battle-verdict">'+verdict+'</div>';
}

function toggleCfg(){var p=document.getElementById('cfgPanel');p.classList.toggle('show');if(p.classList.contains('show')){document.getElementById('cn1').value=persons[0];document.getElementById('cn2').value=persons[1]}}
async function saveCfg(){var n1=document.getElementById('cn1').value.trim(),n2=document.getElementById('cn2').value.trim();if(!n1||!n2){toast('名字不能为空');return}
  await sbPatchCfg('person1',n1);await sbPatchCfg('person2',n2);await loadData();renderAll();document.getElementById('cfgPanel').classList.remove('show');toast('名字已更新')}

document.querySelectorAll('.stats-tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.stats-tab').forEach(function(x){x.classList.remove('active')});this.classList.add('active');curPeriod=this.dataset.period;renderStats()})});

async function init(){try{await loadData();document.getElementById('loading').style.display='none';document.getElementById('main').style.display='block';renderAll()}catch(e){document.getElementById('loading').innerHTML='<div style="color:#c0392b">加载失败，请刷新重试</div>'}}
init();
</script>
</body>
</html>
